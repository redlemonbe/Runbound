# Runbound — dedicated white-label branding file (#25)
#
# Loaded only when the MAIN config enables it:
#
#     server:
#         branding: yes
#
# This file must sit in the SAME directory as the main config and be named
# exactly "branding.conf". Same `key: value` syntax as the main config;
# values may be quoted. Hex colours work (the `#` inside quotes is NOT a
# comment). Branding is WebUI-only — it never affects the REST API.

# --- Identity ---------------------------------------------------------------
brand-name:        "ACME DNS"                       # header + login + page title
accent-color:      "#7c3aed"                        # any CSS colour; hex needs quotes
logo-url:          "https://acme.example/logo.svg"  # empty = built-in globe
favicon-url:       "https://acme.example/fav.ico"   # empty = built-in

# --- About tab (optional, all escaped on render) ----------------------------
about-org:         "ACME Corporation"
about-text:        "Internal resolver — open a ticket with IT for support."
about-support-url: "https://acme.example/support"   # must be http(s)://
