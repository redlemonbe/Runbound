# ─────────────────────────────────────────────────────────────────────────────
# Runbound — Public/shared recursive resolver (VPS / datacenter)
#
# Use-case : High-performance DNS resolver accepting queries from the public
#            internet or a large number of tenant VMs.
# - High rate limit (DDoS mitigation handled at network level)
# - DoT + DoH enabled (Let's Encrypt cert)
# - No local zones (pure forwarding resolver)
# - Memory guard active (auto-clears caches at 80 % RAM)
# ─────────────────────────────────────────────────────────────────────────────

server:
    # ── v0.15.0 directives ───────────────────────────────────────────────
    serve-stale: yes                       # serve expired answers while a refresh is in flight (#108)
    # log-format: json                     # SIEM-ready structured logs — "json" or "text" (default text) (#175)
    # api-socket: "/run/runbound/api.sock" # extra REST API transport: owner-only (0600) Unix socket, in addition to TCP (#174)

    # Bind to the public IP of the server (replace with your IP or 0.0.0.0).
    interface:  0.0.0.0
    port:       53

    do-ip4:     yes
    do-ip6:     yes
    do-udp:     yes
    do-tcp:     yes

    # ── Access control ───────────────────────────────────────────────────────
    # SECURITY NOTICE: Never leave 0.0.0.0/0 allowed on a public port 53 UDP
    # unless you are intentionally running a public service (like 1.1.1.1) 
    # and have network-level anti-DDoS/scrubbing active.
    
    access-control: 127.0.0.0/8    allow   # localhost
    access-control: 10.0.0.0/8     allow   # internal tenant/VPC range
    access-control: 192.168.0.0/16 allow   # office/customer range
    access-control: 0.0.0.0/0      refuse  # block the rest of the internet
    access-control: ::/0           refuse

    # ── Rate limiting ────────────────────────────────────────────────────────
    # 5 000 q/s per source IP; set higher for trusted networks.
    # The inflight cap (4 096 concurrent) provides a hard OOM backstop.
    rate-limit:    5000
    cache-max-ttl: 3600   # cap TTLs at 1 hour

    # Refuse HTTPS/SVCB records — prevents browser DNS-over-HTTPS bypass
    block-https-record: yes

    # ── XDP fast path ────────────────────────────────────────────────────────
    xdp:                yes       # AF_XDP kernel-bypass (default: yes, requires root)
    xdp-hugepages:      512       # huge pages for UMEM (2 MiB pages; 0 = disable)
    xdp-irq-affinity:   auto      # pin NIC RX IRQs to their XDP worker cores
    xdp-cache-snapshot: yes       # zero-lock cache reads on hot path
    xdp-domain-routing: no        # CPUMAP per-domain routing — disables zerocopy (×40 slower)
    #
    # ── CPU governor (issue #158) ─────────────────────────────────────────────
    # Pin XDP worker cores to the 'performance' governor for the duration of the
    # process, then restore the original governor on shutdown.
    # Eliminates frequency-scaling ramp-up jitter on DNS burst traffic.
    # Silent no-op when /sys/.../cpufreq/ is absent (containers, VMs without cpufreq).
    # Requires root or CAP_SYS_ADMIN to write scaling_governor; WARNs and skips
    # individual cores on permission denied.
    xdp-cpu-governor:   none      # none (default) | performance

    # ── Multi-interface XDP (#feat/xdp-multi-interface) ──────────────────────
    # Bind AF_XDP on multiple NICs simultaneously (each gets independent workers).
    # Values:
    #   <name>       — single interface, e.g. nic3 (default, backward-compatible)
    #   <a>,<b>,...  — explicit comma-separated list, e.g. nic2,nic3
    #   auto         — enumerate all eligible physical interfaces (UP, non-bonded)
    #   none         — disable XDP via interface override
    #   (absent)     — auto-detect single interface from listen IP / default route
    #
    # NOTE: XDP is NOT compatible with bonding. Never point xdp-interface at a
    #       bond master. Use independent physical NICs.
    #
    # xdp-interface:  nic3          # single explicit NIC
    # xdp-interface:  nic2,nic3     # dual-fibre 10G
    # xdp-interface:  auto          # bind all eligible NICs

    # ── Performance ──────────────────────────────────────────────────────────
    upstream-racing:         yes    # Query all upstreams in parallel; use fastest reply
    prefetch:                yes
    serve-expired:           yes
    serve-expired-ttl:       86400
    serve-expired-reply-ttl: 30

    # ── DNS rebinding protection ─────────────────────────────────────────────
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 127.0.0.0/8
    private-address: fd00::/8

    # ── Bot defense ───────────────────────────────────────────────────────────
    bot-honeypot-enabled: yes
    bot-ban-duration-secs: 86400

    # ── TLS — DNS-over-TLS (853) + DNS-over-HTTPS (443) ─────────────────────
    # Issue cert with:
    #   certbot certonly --standalone -d dns.example.com
    tls-service-pem: /etc/letsencrypt/live/dns.example.com/fullchain.pem
    tls-service-key: /etc/letsencrypt/live/dns.example.com/privkey.pem

    # Runbound-specific: fix API key via config (override with RUNBOUND_API_KEY)
    # api-key: change-me-in-production

# ── Upstream resolvers — Quad9 + Cloudflare DoT (encrypted) ─────────────────
forward-zone:
    name:                 .
    forward-addr:         9.9.9.9@853
    forward-tls-hostname: dns.quad9.net
    forward-addr:         149.112.112.112@853
    forward-tls-hostname: dns.quad9.net
    forward-addr:         1.1.1.1@853
    forward-tls-hostname: one.one.one.one
    forward-addr:         1.0.0.1@853
    forward-tls-hostname: one.one.one.one
    forward-tls-upstream: yes

# ── Alert thresholds ──────────────────────────────────────────────────────────
# Public resolvers are frequent DDoS amplification targets.
# Block clients exceeding 2 000 q/s for 10 s.

alert:
    name:             ddos-amp
    metric:           client-qps
    threshold:        2000
    window-s:         10
    action:           block
    block-duration-s: 86400
