# ─────────────────────────────────────────────────────────────────────────────
# Runbound — Benchmark / maximum-throughput configuration
#
# Use-case : Measure peak QPS on bare-metal x86-64 or ARM64.
# Target  : 5M+ QPS (XDP fast path, cache-hit rate ≥ 85 %)
#
# WARNING : Several hardening options are disabled for throughput.
#           Do NOT use in production without re-enabling them.
#           See examples/server.conf or examples/secure.conf for production.
#
# Pre-run:
#   sudo sysctl -w vm.nr_hugepages=512
#   sudo cpupower frequency-set -g performance
#   sudo ethtool -K eth0 gro off lro off
#   sudo ethtool -L eth0 combined 4
# ─────────────────────────────────────────────────────────────────────────────

server:
    interface:  0.0.0.0
    port:       53

    do-ip4:     yes
    do-ip6:     yes
    do-udp:     yes
    do-tcp:     yes

    # ── Access control ───────────────────────────────────────────────────────
    access-control: 127.0.0.0/8      allow
    access-control: 10.0.0.0/8       allow
    access-control: 192.168.0.0/16   allow
    access-control: 0.0.0.0/0        refuse

    # ── Rate limiting — disabled for trusted benchmark client ─────────────────
    rate-limit: 0

    # ── Cache ─────────────────────────────────────────────────────────────────
    cache-max-ttl:       86400    # Maximise cache hit rate
    serve-expired:       yes      # Serve stale during warm-up
    serve-expired-ttl:   3600
    prefetch:            yes      # Background refresh of hot records

    # ── DNS resolution ────────────────────────────────────────────────────────
    upstream-racing:     yes      # Parallel upstream queries — use fastest reply
    resolv-fallback:     yes
    block-https-record:  yes      # Refuse HTTPS/SVCB records

    # ── DNSSEC — disabled to eliminate local re-validation overhead ───────────
    dnssec-validation:   no

    # ── Logging — minimum overhead ────────────────────────────────────────────
    verbosity:  0
    logfile:    

    # ── DNS rebinding protection ──────────────────────────────────────────────
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 127.0.0.0/8

    # ── API ───────────────────────────────────────────────────────────────────
    api-port: 8080

    # ── WebUI — disabled during benchmark ────────────────────────────────────
    ui-enabled: no

    # ── Bot defense — disabled (benchmark tooling would trigger honeypot) ─────
    bot-honeypot-enabled: no

    # ── XDP fast path ─────────────────────────────────────────────────────────
    xdp:                  yes
    xdp-hugepages:        512
    xdp-ring-size:        auto
    xdp-irq-affinity:     auto
    xdp-cache-snapshot:   yes
    #
    # !! BENCHMARK TRAP (#155): xdp-domain-routing MUST be 'no' for peak QPS.
    #    Enabling it on a zerocopy interface engages CPUMAP redirect, which
    #    exits the ZC ring (bpf_redirect_map re-queues via NAPI backlog).
    #    Measured regression: 4.77 M qps → 120 k qps (×40 slower).
    #    domain-routing only makes sense on SKB/copy interfaces (cache locality).
    xdp-domain-routing:   no
    xdp-cpu-governor:     performance

    # ── CPU pinning ───────────────────────────────────────────────────────────
    cpu-affinity: yes

# ── Upstream resolvers ────────────────────────────────────────────────────────
forward-zone:
    name:                 .
    forward-addr:         1.1.1.1@853
    forward-tls-hostname: one.one.one.one
    forward-addr:         1.0.0.1@853
    forward-tls-hostname: one.one.one.one
    forward-addr:         9.9.9.9@853
    forward-tls-hostname: dns.quad9.net
    forward-tls-upstream: yes

# ── Pre-load local zones to guarantee 100 % cache-hit rate ───────────────────
# Uncomment and populate with your benchmark domain set.
#
# !! BENCHMARK TRAP (#155): do NOT use private IP addresses (10.x, 192.168.x,
#    172.16.x, 127.x) in local-data when private-address guards are active
#    (see above).  Runbound strips responses containing private IPs as
#    anti-rebinding protection → bench tool sees NXDOMAIN/empty, 0 % hit rate,
#    artificially low QPS.  Use public or documentation IPs instead:
#      RFC 5737 TEST-NET: 192.0.2.x, 198.51.100.x, 203.0.113.x (never routed,
#      safe for synthetic benchmarks, not blocked by private-address).
#
# local-zone: bench.local. static
# local-data: a.bench.local. 60 IN A 203.0.113.1
# local-data: b.bench.local. 60 IN A 203.0.113.2
