# ─────────────────────────────────────────────────────────────────────────────
# Runbound — Master node configuration (slave/master replication)
#
# Use-case : Primary DNS node that serves writes and replicates to one or more
#            slave replicas in real time.
#
# How it works:
#   - Every write via the REST API (POST /dns, POST /blacklist, feed ops…)
#     is recorded in a ring buffer journal (1 000 events).
#   - Slaves poll GET /sync/delta?since=N (HTTPS, port sync-port) to receive
#     only the events they missed since their last sync.
#   - If a slave is > 1 000 events behind, it performs a full snapshot sync
#     (GET /sync/config) automatically.
#   - The master auto-generates a self-signed TLS certificate for the sync
#     endpoint at startup (/etc/runbound/sync-cert.pem).
#     Its SHA-256 fingerprint is logged at INFO level for slave TOFU setup.
#
# Companion slave config: see examples/slave.conf or docs/configuration.md
# ─────────────────────────────────────────────────────────────────────────────

server:
    # local-zone-dnssec: yes   # v0.20.0 #201 — online DNSSEC signing of local zones (master signs, keys replicated to slaves)
    # ── v0.15.0 directives ───────────────────────────────────────────────
    serve-stale: yes                       # serve expired answers while a refresh is in flight (#108)
    # log-format: json                     # SIEM-ready structured logs — "json" or "text" (default text) (#175)
    # api-socket: "/run/runbound/api.sock" # extra REST API transport: owner-only (0600) Unix socket, in addition to TCP (#174)

    # ── Network ──────────────────────────────────────────────────────────────
    interface:  0.0.0.0
    port:       53

    do-ip4:     yes
    do-ip6:     yes
    do-udp:     yes
    do-tcp:     yes

    # ── Access control ────────────────────────────────────────────────────────
    access-control: 127.0.0.0/8      allow
    access-control: 192.168.1.0/24   allow   # adjust to your subnet
    access-control: 10.0.0.0/8       allow
    access-control: 0.0.0.0/0        refuse

    # ── Rate limiting ─────────────────────────────────────────────────────────
    rate-limit:    200
    cache-max-ttl: 3600

    # Refuse HTTPS/SVCB records — prevents browser DNS-over-HTTPS bypass
    block-https-record: yes

    # ── Performance ──────────────────────────────────────────────────────────
    prefetch:            yes
    serve-expired:       yes
    serve-expired-ttl:   86400
    serve-expired-reply-ttl: 30

    # ── DNS rebinding protection ──────────────────────────────────────────────
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 127.0.0.0/8
    private-address: fd00::/8

    # ── Master/slave replication ──────────────────────────────────────────────
    mode:      master   # default — may be omitted

    # HTTPS sync server port — must be reachable by all slave nodes.
    # The sync server binds on 0.0.0.0:<sync-port> (all interfaces).
    # The main REST API remains on 127.0.0.1:<api-port> (localhost only).
    sync-port: 8082

    # Shared Bearer token used by slaves to authenticate to the sync endpoints.
    # If omitted, a random 256-bit key is generated at startup and printed to
    # the log. Copy it to all slave configs before their first start.
    #
    # Best practice: generate once and write to a file on both nodes:
    #   openssl rand -hex 32 > /etc/runbound/sync.key
    #   chmod 600 /etc/runbound/sync.key
    # Then reference it here or set RUNBOUND_SYNC_KEY in the environment.
    sync-key:  change-me-and-copy-to-slave

    # Allow slaves on private (RFC 1918) addresses to register.
    # Required when master and slaves are on a LAN.
    sync-allow-private-relay: yes

    # ── REST API ──────────────────────────────────────────────────────────────
    api-port: 8080
    # api-key is auto-generated at startup and saved to /etc/runbound/api.key
    # Override with RUNBOUND_API_KEY environment variable.

    # ── Embedded WebUI (HTTPS, since v0.9.24) ────────────────────────────────
    ui-enabled: yes
    ui-port:    8091
    # TLS certificate auto-generated; download CA at https://HOST:8091/webui/ca.crt

    # ── WebUI TLS — add your server's LAN IP as a certificate SAN ────────────
    # ui-tls-san: 192.168.1.10   # replace with this node's IP

    # ── Bot defense ───────────────────────────────────────────────────────────
    bot-honeypot-enabled: yes
    bot-ban-duration-secs: 86400

    # ── Local zones ───────────────────────────────────────────────────────────
    # Entries added here are included in full-sync snapshots sent to slaves.
    # Entries added via POST /dns are replicated via the delta journal.
    local-zone: home. static
    local-data: nas.home. 300 IN A 192.168.1.10
    local-data: router.home. 300 IN A 192.168.1.1

    # ── Memory guard (always active — no config needed) ───────────────────────
    # At ≥ 80 % system RAM: rate-limiter + resolver cache purged automatically.
    # Inflight semaphore: max 4 096 concurrent requests → REFUSED if exceeded.

    # ── Logging ───────────────────────────────────────────────────────────────
    verbosity: 1
    # logfile: /var/log/runbound/runbound.log

# ── ICMP flood protection (optional, v0.9.1+) ───────────────────────────────
# Configure via PUT /api/icmp/config or manage through the WebUI Protection tab.
# Example API call:
#   curl -X PUT http://127.0.0.1:8080/api/icmp/config #     -H Authorization: Bearer  #     -H Content-Type: application/json #     -d '{enable:true,rate_limit:10,burst:10,ban_threshold:30}'

# ── Anycast (optional) — front the master/slave pair with one shared service IP ──
# Anycast is the DATA plane (clients reach the nearest healthy node on a shared VIP); the
# sync relay above is the CONTROL plane (master→slave replication). They are independent:
# every node announces the SAME `address` but with its OWN `local-address`. Runbound writes
# the exabgp config and supervises the announcer; the route drops when the node stops (systemd
# cgroup). Bind `interface:` to the VIP (not 0.0.0.0), put the VIP on dummy0/lo, set
# `rp_filter=2`, install exabgp, run under systemd. Full guide: docs/anycast.md
#
# anycast:
#     address:       198.51.100.53/32     # the shared anycast VIP (/32) — identical on master AND slave
#     local-as:      65001                # this node's BGP AS
#     peer:          192.0.2.1            # the BGP router / route-reflector
#     peer-as:       65000                # the peer's BGP AS
#     local-address: 192.168.1.10         # THIS node's own IP facing the peer (the slave uses its own)
#     # exabgp-path: /usr/sbin/exabgp     # optional, defaults to "exabgp" on $PATH

# ── Upstream resolvers ────────────────────────────────────────────────────────
forward-zone:
    name:                 .
    forward-addr:         1.1.1.1@853
    forward-tls-hostname: one.one.one.one
    forward-addr:         1.0.0.1@853
    forward-tls-hostname: one.one.one.one
    forward-tls-upstream: yes

# ── Abuse detection / DDoS — recommended base rules ─────────────────────────────
# Escalating per-client query-rate rules. Escalation (tarpit/block) applies ONLY to
# VERIFIED sources (TCP/DoT/DoH/DoQ, or UDP carrying a valid DNS cookie) — a spoofable
# UDP source is never tarpitted/banned (it would let an attacker get a victim banned).
# Bans are dropped at the XDP/kernel layer. Edit live in the WebUI (Protection tab,
# "Load recommended") or via PUT /api/alerts/rules. name: must be first in each block.
# Tune thresholds to your traffic — a busy NAT/forwarder can legitimately be high.
dns-cookies: yes               # verify UDP source IPs (enables UDP abuse escalation)
audit-log: yes                 # record who (user/admin) does what — see WebUI Logs
abuse-tarpit-delay-ms:  2000   # how long a tarpitted source is held before REFUSED
abuse-tarpit-max-conns: 256    # cap on concurrently-held tarpit requests (anti-self-DoS)

alert:
    name:             observe          # log notable clients only — zero traffic impact
    metric:           client-qps
    window-s:         10
    threshold:        2000

alert:
    name:             tarpit-abuse      # hold a verified abuser ~2 s, then REFUSED
    metric:           client-qps
    window-s:         10
    threshold:        5000
    action:           tarpit
    block-duration-s: 60

alert:
    name:             ban-flood         # ban an extreme flood for 1 h (XDP/kernel drop)
    metric:           client-qps
    window-s:         10
    threshold:        20000
    action:           block
    block-duration-s: 3600
