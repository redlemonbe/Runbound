# Runbound — Benchmark / High-Throughput Configuration
#
# Optimised for maximum QPS on bare-metal x86-64 or ARM64 hardware.
# Target: 5M+ QPS (XDP fast path, cache hit rate >= 85 %).
#
# DO NOT use this file as a production default — several hardening options
# are disabled for throughput. See docs/configuration.md for full reference.

server:
    # ── Network ──────────────────────────────────────────────────────────
    interface:  0.0.0.0
    port:       53

    do-ip4:     yes
    do-ip6:     yes
    do-udp:     yes
    do-tcp:     yes   # keep yes; TCP load is small vs UDP in benchmark

    # ── Access control ───────────────────────────────────────────────────
    # Restrict to benchmark client subnet — refuse everything else
    access-control: 127.0.0.0/8      allow
    access-control: 10.0.0.0/8       allow
    access-control: 192.168.0.0/16   allow
    access-control: 0.0.0.0/0        refuse

    # ── Rate limiting ────────────────────────────────────────────────────
    rate-limit: 0   # disabled — benchmark client is trusted, not rate-limited

    # ── Logging (minimum overhead) ────────────────────────────────────────
    # verbosity: 0 = zero overhead on NOERROR hot path
    verbosity:  0
    logfile:    ""   # stdout / journald — no file I/O on the hot path

    # ── Cache ─────────────────────────────────────────────────────────────
    cache-max-ttl:      86400   # full TTL — maximise cache hit rate
    cache-min-entries:  65536   # keep cache large under memory pressure

    # ── DNS resolution ────────────────────────────────────────────────────
    upstream-racing: yes    # send to all upstreams simultaneously
    resolv-fallback: yes

    # ── DNS rebinding protection (keep on) ────────────────────────────────
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 127.0.0.0/8

    # ── API ───────────────────────────────────────────────────────────────
    api-port: 8080
    # api-key is loaded from RUNBOUND_API_KEY env var

    # ── Web UI (optional during benchmark) ───────────────────────────────
    ui-enabled: no   # disable to eliminate UI overhead during benchmark run

    # ── DNSSEC ────────────────────────────────────────────────────────────
    dnssec-validation: no   # trust upstream AD bit — no local re-validation overhead

    # ── Memory guard ──────────────────────────────────────────────────────
    # Defaults are kept — purge at 80 % RAM usage protects the benchmark host

    # ── XDP fast path ──────────────────────────────────────────────────────
    xdp: yes                          # mandatory for 5M+ QPS target
    # xdp-interface: eth0             # override if auto-select picks wrong NIC

    # 2 MiB hugepages for UMEM (requires vm.nr_hugepages >= 512 in sysctl):
    #   sudo sysctl -w vm.nr_hugepages=512
    xdp-hugepages: 512

    # Maximise NIC ring depth (ixgbe: 4096)
    xdp-ring-size: auto

    # Pin NIC IRQs to XDP worker cores
    xdp-irq-affinity: auto

    # Enable cache snapshot in XDP worker (< 1 µs per cached response)
    xdp-cache-snapshot: yes

    # Route same-domain queries to same core (L1/L2 warm cache)
    xdp-domain-routing: yes

    # Set CPU governor to performance to eliminate P-state wakeup latency
    xdp-cpu-governor: performance

    # ── CPU affinity ──────────────────────────────────────────────────────
    cpu-affinity: yes   # pin tokio workers + DNS socket workers to physical cores

    # ── io_uring (slow path TCP/DoT/DoH) ─────────────────────────────────
    # Reduces syscall overhead on the non-XDP path.
    # Enable only if kernel >= 5.10 and io_uring_disabled = 0:
    #   cat /proc/sys/kernel/io_uring_disabled
    # io-uring {
    #     enable: yes
    # }

# ── Upstream resolvers (DoT for forwarded misses) ────────────────────────────
# Use DoT for upstream queries — adds latency on miss but benchmark workload
# is pre-cached (cache hit rate >= 85 %) so miss rate is low.
forward-zone:
    name:                 "."
    forward-addr:         1.1.1.1@853
    forward-addr:         1.0.0.1@853
    forward-addr:         9.9.9.9@853
    forward-tls-upstream: yes

# ── Local zone (pre-cache benchmark domains) ─────────────────────────────────
# Uncomment and populate with your benchmark domain set to guarantee
# 100 % cache hit rate from XDP fast path.
#
# local-zone: "bench.local." static
# local-data: "a.bench.local. 300 IN A 192.168.1.1"
# local-data: "b.bench.local. 300 IN A 192.168.1.2"
# ... (repeat for all domains in your query file)
