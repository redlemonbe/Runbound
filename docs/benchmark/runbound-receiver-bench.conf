server:
  interface: 10.10.10.1
  interface: 10.10.20.1
  port: 53
  do-ip4: yes
  do-udp: yes
  do-tcp: yes
  access-control: 0.0.0.0/0 allow
  rate-limit: 0
  cache-min-ttl: 3600
  cache-max-ttl: 86400
  xdp-cache-snapshot-size: 65536
  upstream-racing: yes
  xdp: yes
  xdp-interface: enp33s0f0,enp33s0f1
  chroot: ""
  username: ""
  pidfile: "/run/runbound-dual.pid"

forward-zone:
  name: "."
  forward-addr: 1.1.1.1
  forward-addr: 8.8.8.8
  forward-addr: 9.9.9.9
  forward-addr: 8.8.4.4
  forward-addr: 1.0.0.1
